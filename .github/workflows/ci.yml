name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build crate
        run: cargo build --package ttl-vault --lib

      - name: Run tests
        run: cargo test --package ttl-vault

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --package ttl-vault -- -D warnings

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

      - name: Build WASM with release
        run: cargo build --package ttl-vault --target wasm32-unknown-unknown --release

      - name: Check WASM size
        run: |
          WASM_PATH="target/wasm32-unknown-unknown/release/ttl_vault.wasm"
          WASM_SIZE=$(stat -f%z "$WASM_PATH" 2>/dev/null || stat -c%s "$WASM_PATH" 2>/dev/null)
          WASM_SIZE_KB=$((WASM_SIZE / 1024))
          THRESHOLD_KB=512
          
          echo "WASM size: ${WASM_SIZE_KB} KB (threshold: ${THRESHOLD_KB} KB)"
          
          if [ "$WASM_SIZE_KB" -gt "$THRESHOLD_KB" ]; then
            echo "❌ WASM size exceeds threshold by $((WASM_SIZE_KB - THRESHOLD_KB)) KB"
            exit 1
          fi
          echo "✓ WASM size check passed"
