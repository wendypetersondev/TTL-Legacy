openapi: 3.1.0
info:
  title: TTL-Legacy Backend API
  description: >
    Backend API for TTL-Legacy, a decentralized "Dead Man's Switch" built on Stellar/Soroban.
    This API provides endpoints for vault management, reminder preferences, notifications, and administrative operations.
  version: 1.0.0
  contact:
    name: TTL-Legacy Team
    url: https://github.com/TTL-Legacy/TTL-Legacy
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://api.ttl-legacy.app
    description: Production server
  - url: https://testnet-api.ttl-legacy.app
    description: Testnet server

tags:
  - name: Health & Status
    description: API health checks and status endpoints
  - name: Reminder Preferences
    description: Vault reminder notification preferences
  - name: Notifications
    description: Push notification and delivery management
  - name: TTL Insurance
    description: TTL insurance policy management
  - name: Vaults
    description: Vault query and analytics
  - name: Vault Sharing
    description: Share vault access with other users
  - name: Vault Backup
    description: Backup and recovery operations

paths:
  /health:
    get:
      summary: Health check
      description: Returns API health status without requiring database connectivity
      operationId: getHealth
      tags:
        - Health & Status
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  version:
                    type: string
                    description: Semantic version of the API
                required:
                  - status
                  - version
              examples:
                success:
                  value:
                    status: ok
                    version: 1.0.0

  /ready:
    get:
      summary: Readiness check
      description: Returns readiness status including database connectivity
      operationId: getReady
      tags:
        - Health & Status
      responses:
        '200':
          description: API is ready and database is connected
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  version:
                    type: string
                  database:
                    type: string
                    enum: [connected]
                required:
                  - status
                  - version
                  - database
        '503':
          description: Service unavailable (database not connected)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/vaults/{vault_id}/reminder-preferences:
    parameters:
      - name: vault_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Unique identifier of the vault
    get:
      summary: Get reminder preferences for a vault
      description: Retrieve the current reminder notification preferences for a specific vault
      operationId: getPreferences
      tags:
        - Reminder Preferences
      responses:
        '200':
          description: Reminder preferences retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderPreferences'
        '404':
          description: Vault not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Set reminder preferences for a vault
      description: >
        Update or create reminder notification preferences for a vault.
        Supports idempotent requests via the `idempotency-key` header.
      operationId: setPreferences
      tags:
        - Reminder Preferences
      parameters:
        - name: idempotency-key
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: >
            UUID to ensure idempotent requests. If provided, the same response will be returned
            for identical requests within 24 hours.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPreferencesRequest'
            examples:
              emailOnly:
                summary: Email-only reminders
                value:
                  channels:
                    - email
                  hours_before_expiry: 24
                  frequency: daily
              multiChannel:
                summary: Multiple notification channels
                value:
                  channels:
                    - email
                    - sms
                    - push
                  hours_before_expiry: 48
                  frequency: weekly
      responses:
        '200':
          description: Preferences set successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReminderPreferences'
        '400':
          description: Invalid request (empty channels or invalid hours_before_expiry)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                emptyChannels:
                  value:
                    error: "channels must not be empty"
                invalidHours:
                  value:
                    error: "hours_before_expiry must be > 0"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/notifications/register:
    post:
      summary: Register a device token for push notifications
      description: Register a new device push token to receive vault-related notifications
      operationId: registerDeviceToken
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterTokenRequest'
      responses:
        '201':
          description: Device token registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceToken'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/notifications/preferences:
    put:
      summary: Update notification preferences
      description: Update owner notification preferences (channels, frequency, locale)
      operationId: updateNotificationPreferences
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePreferencesRequest'
      responses:
        '200':
          description: Preferences updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/notifications/unsubscribe:
    get:
      summary: Unsubscribe from reminder emails
      description: Unsubscribe an owner from all reminder email notifications using an unsubscribe token
      operationId: unsubscribeReminders
      tags:
        - Notifications
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Unsubscribe token (provided in notification emails)
      responses:
        '200':
          description: Successfully unsubscribed
          content:
            text/plain:
              schema:
                type: string
              examples:
                success:
                  value: "You (owner_address) have been unsubscribed from reminder emails."
        '400':
          description: Invalid or expired unsubscribe token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ttl-insurance/purchase:
    post:
      summary: Purchase TTL insurance policy
      description: >
        Purchase a TTL insurance policy to automatically extend TTL when owner becomes inactive.
        Requires owner authentication.
      operationId: purchaseTtlInsurance
      tags:
        - TTL Insurance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseTtlInsuranceRequest'
      responses:
        '201':
          description: TTL insurance policy purchased successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TtlInsurancePolicy'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/ttl-insurance/vaults/{vault_id}:
    get:
      summary: Get TTL insurance policy for a vault
      description: Retrieve TTL insurance policy details for a specific vault
      operationId: getTtlInsurancePolicy
      tags:
        - TTL Insurance
      parameters:
        - name: vault_id
          in: path
          required: true
          schema:
            type: string
          description: The vault ID
      responses:
        '200':
          description: Policy retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TtlInsurancePolicy'
        '404':
          description: Vault or policy not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/vaults/search:
    post:
      summary: Search vaults
      description: Search for vaults based on owner, beneficiary, status, and date range with pagination
      operationId: searchVaults
      tags:
        - Vaults
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchQuery'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResult'
        '400':
          description: Invalid search parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/vaults/compare:
    post:
      summary: Compare multiple vaults
      description: Retrieve and compare multiple vaults by their IDs
      operationId: compareVaults
      tags:
        - Vaults
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vault_ids:
                  type: array
                  items:
                    type: string
                  description: Array of vault IDs to compare
              required:
                - vault_ids
      responses:
        '200':
          description: Comparison results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComparisonResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/vaults/{vault_id}/export:
    get:
      summary: Export vault data
      description: Export vault data, history, and audit log in JSON or CSV format
      operationId: exportVault
      tags:
        - Vaults
      parameters:
        - name: vault_id
          in: path
          required: true
          schema:
            type: string
          description: The vault ID
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [json, csv]
            default: json
          description: Export format
      responses:
        '200':
          description: Vault data exported successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportData'
            text/csv:
              schema:
                type: string
        '404':
          description: Vault not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Invalid format specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/vaults/{vault_id}/analytics:
    get:
      summary: Get vault analytics
      description: Retrieve analytics data for vault activity, TTL, and release rates
      operationId: getVaultAnalytics
      tags:
        - Vaults
      parameters:
        - name: vault_id
          in: path
          required: true
          schema:
            type: string
          description: The vault ID
      responses:
        '200':
          description: Analytics data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultAnalytics'
        '404':
          description: Vault not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/vaults/{vault_id}/share:
    post:
      summary: Share vault access
      description: Grant another address access to view or edit vault with specified permissions
      operationId: shareVault
      tags:
        - Vault Sharing
      parameters:
        - name: vault_id
          in: path
          required: true
          schema:
            type: string
          description: The vault ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareRequest'
      responses:
        '201':
          description: Vault shared successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultShare'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/vaults/{vault_id}/backup:
    post:
      summary: Create vault backup
      description: Create an encrypted backup of vault state for disaster recovery
      operationId: createVaultBackup
      tags:
        - Vault Backup
      parameters:
        - name: vault_id
          in: path
          required: true
          schema:
            type: string
          description: The vault ID
      responses:
        '201':
          description: Backup created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultBackup'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: List vault backups
      description: List all backups for a specific vault
      operationId: listVaultBackups
      tags:
        - Vault Backup
      parameters:
        - name: vault_id
          in: path
          required: true
          schema:
            type: string
          description: The vault ID
      responses:
        '200':
          description: Backups retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  backups:
                    type: array
                    items:
                      $ref: '#/components/schemas/VaultBackup'
        '404':
          description: Vault not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/vaults/restore:
    post:
      summary: Restore vault from backup
      description: Restore a vault to a previous state using an encrypted backup and decryption key
      operationId: restoreVaultBackup
      tags:
        - Vault Backup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreRequest'
      responses:
        '200':
          description: Vault restored successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vault'
        '400':
          description: Invalid request or decryption failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Backup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message
        status_code:
          type: integer
          description: HTTP status code
      required:
        - error

    Locale:
      type: string
      enum: [en, es, fr, de]
      description: Supported locales

    Channel:
      type: string
      enum: [email, sms, push]
      description: Notification delivery channel

    Frequency:
      type: string
      enum: [once, daily, weekly, hourly, monthly]
      description: Reminder frequency

    ReminderPreferences:
      type: object
      properties:
        vault_id:
          type: string
          format: uuid
          description: Vault ID
        channels:
          type: array
          items:
            $ref: '#/components/schemas/Channel'
          description: Notification channels enabled
        hours_before_expiry:
          type: integer
          minimum: 1
          description: Hours before expiry to send reminder
        frequency:
          $ref: '#/components/schemas/Frequency'
      required:
        - vault_id
        - channels
        - hours_before_expiry
        - frequency

    SetPreferencesRequest:
      type: object
      properties:
        channels:
          type: array
          items:
            $ref: '#/components/schemas/Channel'
          minItems: 1
          description: Notification channels to enable
        hours_before_expiry:
          type: integer
          minimum: 1
          description: Hours before expiry to send reminder
        frequency:
          $ref: '#/components/schemas/Frequency'
      required:
        - channels
        - hours_before_expiry
        - frequency

    RegisterTokenRequest:
      type: object
      properties:
        owner:
          type: string
          description: Owner address
        token:
          type: string
          description: Device push token
        platform:
          type: string
          enum: [ios, android, web]
          description: Device platform
      required:
        - owner
        - token
        - platform

    DeviceToken:
      type: object
      properties:
        owner:
          type: string
          description: Owner address
        token:
          type: string
          description: Device push token
        platform:
          type: string
          enum: [ios, android, web]
        registered_at:
          type: string
          format: date-time
          description: Registration timestamp (RFC3339)
      required:
        - owner
        - token
        - platform
        - registered_at

    NotificationPreferences:
      type: object
      properties:
        owner:
          type: string
          description: Owner address
        expiry_warning_enabled:
          type: boolean
          default: true
        check_in_reminder_enabled:
          type: boolean
          default: true
        vault_released_enabled:
          type: boolean
          default: true
        warning_hours_before:
          type: integer
          default: 24
          description: Hours before expiry to warn
        locale:
          $ref: '#/components/schemas/Locale'
      required:
        - owner

    UpdatePreferencesRequest:
      type: object
      properties:
        owner:
          type: string
          description: Owner address
        expiry_warning_enabled:
          type: boolean
        check_in_reminder_enabled:
          type: boolean
        vault_released_enabled:
          type: boolean
        warning_hours_before:
          type: integer
        locale:
          $ref: '#/components/schemas/Locale'

    TtlInsurancePolicy:
      type: object
      properties:
        vault_id:
          type: string
          description: Associated vault ID
        extension_seconds:
          type: integer
          description: Seconds to extend TTL when triggered
        inactivity_threshold_seconds:
          type: integer
          description: Inactivity duration before triggering
        enabled:
          type: boolean
        purchased_at:
          type: string
          format: date-time
        last_extended_at:
          type: string
          format: date-time
          nullable: true
      required:
        - vault_id
        - extension_seconds
        - inactivity_threshold_seconds
        - enabled
        - purchased_at

    PurchaseTtlInsuranceRequest:
      type: object
      properties:
        extension_seconds:
          type: integer
          minimum: 1
          description: Seconds to extend TTL
        inactivity_threshold_seconds:
          type: integer
          minimum: 1
          description: Inactivity threshold in seconds
      required:
        - extension_seconds
        - inactivity_threshold_seconds

    VaultStatus:
      type: string
      enum: [active, expired, released, paused]
      description: Current vault status

    Vault:
      type: object
      properties:
        id:
          type: string
          description: Vault ID
        owner:
          type: string
          description: Vault owner address
        beneficiary:
          type: string
          description: Beneficiary address
        balance:
          type: integer
          format: int64
          description: Vault balance in stroops
        check_in_interval:
          type: integer
          description: Check-in interval in seconds
        last_check_in:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/VaultStatus'
        ttl_remaining:
          type: integer
          nullable: true
          description: Remaining TTL in seconds
      required:
        - id
        - owner
        - beneficiary
        - balance
        - check_in_interval
        - created_at
        - status

    SearchQuery:
      type: object
      properties:
        owner:
          type: string
          description: Filter by owner address
        beneficiary:
          type: string
          description: Filter by beneficiary address
        status:
          $ref: '#/components/schemas/VaultStatus'
        created_after:
          type: string
          format: date-time
          description: Filter vaults created after this date
        created_before:
          type: string
          format: date-time
          description: Filter vaults created before this date
        page:
          type: integer
          minimum: 1
          default: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20

    SearchResult:
      type: object
      properties:
        vaults:
          type: array
          items:
            $ref: '#/components/schemas/Vault'
        total:
          type: integer
          description: Total matching vaults
        page:
          type: integer
        limit:
          type: integer
      required:
        - vaults
        - total
        - page
        - limit

    ComparisonResult:
      type: object
      properties:
        vaults:
          type: array
          items:
            $ref: '#/components/schemas/Vault'
      required:
        - vaults

    EventType:
      type: string
      enum: [check_in, ttl_update, status_change, deposit, withdrawal, release]

    VaultEvent:
      type: object
      properties:
        vault_id:
          type: string
        event_type:
          $ref: '#/components/schemas/EventType'
        timestamp:
          type: string
          format: date-time
        data:
          type: object
          additionalProperties: true
      required:
        - vault_id
        - event_type
        - timestamp

    AuditEntry:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        action:
          type: string
        actor:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
        - timestamp
        - action
        - actor

    ExportData:
      type: object
      properties:
        vault:
          $ref: '#/components/schemas/Vault'
        history:
          type: array
          items:
            $ref: '#/components/schemas/VaultEvent'
        audit_log:
          type: array
          items:
            $ref: '#/components/schemas/AuditEntry'
      required:
        - vault
        - history
        - audit_log

    TimeSeriesPoint:
      type: object
      properties:
        date:
          type: string
          format: date
          description: Date in ISO-8601 format (YYYY-MM-DD)
        vaults_created:
          type: integer
        vaults_released:
          type: integer
      required:
        - date
        - vaults_created
        - vaults_released

    VaultAnalytics:
      type: object
      properties:
        total_vaults:
          type: integer
        active_vaults:
          type: integer
        average_ttl_seconds:
          type: number
          format: double
        release_rate:
          type: number
          format: double
          description: Fraction of vaults that are released
        time_series:
          type: array
          items:
            $ref: '#/components/schemas/TimeSeriesPoint'
      required:
        - total_vaults
        - active_vaults
        - average_ttl_seconds
        - release_rate
        - time_series

    SharePermission:
      type: string
      enum: [view_only, edit, admin]

    VaultShare:
      type: object
      properties:
        share_id:
          type: string
          format: uuid
        vault_id:
          type: string
        shared_with:
          type: string
          description: Address or email vault is shared with
        permission:
          $ref: '#/components/schemas/SharePermission'
        created_at:
          type: string
          format: date-time
      required:
        - share_id
        - vault_id
        - shared_with
        - permission
        - created_at

    ShareRequest:
      type: object
      properties:
        shared_with:
          type: string
          description: Address or email to share with
        permission:
          $ref: '#/components/schemas/SharePermission'
      required:
        - shared_with
        - permission

    VaultBackup:
      type: object
      properties:
        backup_id:
          type: string
          format: uuid
        vault_id:
          type: string
        created_at:
          type: string
          format: date-time
        encrypted_payload:
          type: string
          description: Base64-encoded AES-GCM encrypted vault state JSON
      required:
        - backup_id
        - vault_id
        - created_at
        - encrypted_payload

    RestoreRequest:
      type: object
      properties:
        backup_id:
          type: string
          format: uuid
        encryption_key:
          type: string
          description: Base64-encoded 32-byte AES key used during backup
      required:
        - backup_id
        - encryption_key

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for authentication
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication for passkey-authenticated requests

security:
  - ApiKeyAuth: []
  - BearerAuth: []
